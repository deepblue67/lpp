<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Petite Pause — Suivi CA HT Moy/Jour</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy:#2E4E8C;--indigo:#5072B8;--indigo-mid:#6A8FCC;--indigo-light:#C8D8F0;--indigo-pale:#EBF0FA;
      --amber:#E8A020;--coral:#E05A4A;--bg:#F2F5FC;--card:#FFFFFF;
      --text:#1A2440;--text-light:#5A6A8A;--border:#D5DFF0;
      --shadow:0 2px 12px rgba(26,43,82,.10);--shadow-hover:0 6px 24px rgba(26,43,82,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    header{
      background:linear-gradient(135deg,var(--navy) 0%,#1E3A7A 100%);
      padding:0 32px;display:flex;align-items:center;justify-content:space-between;
      height:80px;box-shadow:0 2px 16px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;
    }
    .header-left{display:flex;align-items:center;gap:14px;}
    .header-title{color:#fff;}
    .header-title h1{font-size:18px;font-weight:700;letter-spacing:.3px;}
    .header-title p{font-size:11px;color:var(--indigo-light);font-weight:400;margin-top:1px;}
    .header-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;color:#fff;pointer-events:none;}
    .header-center h2{font-size:24px;font-weight:800;letter-spacing:.2px;}
    .header-center p{font-size:12px;color:var(--indigo-light);margin-top:3px;font-weight:400;}
    .header-right{display:flex;align-items:center;gap:10px;}
    #last-update{font-size:11px;color:var(--indigo-light);}
    .btn-refresh{background:var(--indigo-mid);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
    .btn-refresh:hover{background:var(--indigo);}
    .filters-bar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .filter-label{font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;}
    .filter-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;cursor:pointer;outline:none;transition:border-color .2s;}
    .filter-select:focus{border-color:var(--indigo-mid);}
    main{padding:28px 32px;max-width:1440px;margin:0 auto;}
    .site-block{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:24px;overflow:hidden;transition:box-shadow .2s;}
    .site-block:hover{box-shadow:var(--shadow-hover);}
    .site-header{
      padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);
    }
    .site-name{font-size:17px;font-weight:800;display:flex;align-items:center;gap:10px;}
    .site-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
    .site-meta{font-size:12px;color:var(--text-light);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .days-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;}
    .site-body{display:grid;grid-template-columns:270px 1fr;gap:0;}
    .gauge-panel{
      padding:16px 18px 14px;border-right:1px solid var(--border);
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .gauge-title{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;text-align:center;}
    .chart-panel{padding:18px 20px 16px;}
    .chart-subtitle{font-size:11px;color:var(--text-light);margin-bottom:10px;}
    .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;}
    .metric-item{background:var(--indigo-pale);border-radius:9px;padding:9px 11px;}
    .metric-item.full{grid-column:1/-1;}
    .metric-label{font-size:9px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
    .metric-value{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
    .ecart-pos{background:#D4EDDA;}
    .ecart-pos .metric-label,.ecart-pos .metric-value{color:#155724;}
    .ecart-neg{background:#F8D7DA;}
    .ecart-neg .metric-label,.ecart-neg .metric-value{color:#721C24;}
    .toggle-btn{border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--text-light);transition:all .15s;white-space:nowrap;}
    .toggle-btn.active{background:var(--indigo-mid);color:#fff;border-color:var(--indigo-mid);}
    .toggle-btn:hover:not(.active){background:var(--indigo-pale);border-color:var(--indigo-mid);}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;color:var(--text-light);}
    .spinner{width:36px;height:36px;border:3px solid var(--indigo-light);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    footer{text-align:center;padding:24px;font-size:12px;color:var(--text-light);border-top:1px solid var(--border);margin-top:8px;}
    @media(max-width:1000px){
      .site-body{grid-template-columns:1fr;}
      .gauge-panel{border-right:none;border-bottom:1px solid var(--border);}
    }
    @media(max-width:600px){main{padding:16px;}header{padding:0 16px;}.filters-bar{padding:12px 16px;}}
  </style>
</head>
<body>

<header style="position:relative">
  <div class="header-left">
    <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="24" fill="white"/>
      <text x="50" y="58" text-anchor="middle" font-size="30" font-weight="bold" fill="#2E4E8C" font-family="Arial">$</text>
      <path d="M18 30 Q50 10 82 30" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
      <polygon points="82,30 70,22 78,42" fill="white"/>
      <path d="M82 70 Q50 90 18 70" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
      <polygon points="18,70 30,78 22,58" fill="white"/>
    </svg>
    <div class="header-title" style="margin-left:14px">
      <h1>La Petite Pause</h1>
      <p>Performance journalière</p>
    </div>
  </div>
  <div class="header-center">
    <h2>Suivi CA HT Moy/Jour — Par Magasin</h2>
    <p>Objectif N = CA moy/jour N-1 × nb jours travaillés N</p>
  </div>
  <div class="header-right">
    <span id="last-update">—</span>
    <button class="btn-refresh" onclick="loadData()">↻ Actualiser</button>
  </div>
</header>

<div class="filters-bar">
  <span class="filter-label">Période</span>
  <select class="filter-select" id="nb-months" onchange="applyFilters()">
    <option value="6">6 derniers mois</option>
    <option value="12" selected>12 derniers mois</option>
    <option value="18">18 derniers mois</option>
    <option value="24">24 derniers mois</option>
  </select>
</div>

<main>
  <div id="content">
    <div class="loading"><div class="spinner"></div><span>Chargement des données…</span></div>
  </div>
</main>

<footer>Dashboard La Petite Pause — Suivi CA HT Moy/Jour &nbsp;·&nbsp; Données HISTORIQUE CA HT depuis Google Sheets</footer>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycKoHGdiUe0MREknK8zrduuIou2yqfRMyLo8MSEPN0xxe4F4W3m0w23Y1dT-of9PBU/exec';

const SITES = ['Lingo','Stras','Eckbo','Schilic','Illkirch'];
const SITE_NAMES = {Lingo:'Lingolsheim',Stras:'Strasbourg',Eckbo:'Eckbolsheim',Schilic:'Schiltigheim',Illkirch:'Illkirch'};
const SITE_COLORS = {Lingo:'#3B5998',Stras:'#E84393',Eckbo:'#FF8C00',Schilic:'#28A745',Illkirch:'#8B5CF6'};
const MOIS_NUM = {octobre:10,novembre:11,décembre:12,janvier:1,février:2,mars:3,avril:4,mai:5,juin:6,juillet:7,août:8,septembre:9};

let rawData = [];
let CHARTS = {};
let chartSlots = []; // slots courants, mémorisés pour re-render ciblé
let chartLast  = []; // last courant

// État des toggles par magasin (type: 'bar'|'line', metric: 'ca'|'moy')
const chartType   = {Lingo:'bar',  Stras:'bar',  Eckbo:'bar',  Schilic:'bar',  Illkirch:'bar'};
const chartMetric = {Lingo:'ca',   Stras:'ca',   Eckbo:'ca',   Schilic:'ca',   Illkirch:'ca'};

function setChartType(site, type) {
  chartType[site] = type;
  ['bar','line'].forEach(t => {
    const btn = document.getElementById(`btn-type-${t}-${site}`);
    if (btn) btn.classList.toggle('active', t === type);
  });
  if (CHARTS[site]) { CHARTS[site].destroy(); delete CHARTS[site]; }
  renderChart(site, chartLast, chartSlots);
}

function setChartMetric(site, metric) {
  chartMetric[site] = metric;
  ['ca','moy'].forEach(m => {
    const btn = document.getElementById(`btn-metric-${m}-${site}`);
    if (btn) btn.classList.toggle('active', m === metric);
  });
  if (CHARTS[site]) { CHARTS[site].destroy(); delete CHARTS[site]; }
  renderChart(site, chartLast, chartSlots);
}

const fmt0 = n => (isNaN(n)||n===null) ? '—' : Math.round(n).toLocaleString('fr-FR');
const fmtE = n => fmt0(n) === '—' ? '—' : fmt0(n) + ' €';
const fmtK = n => {
  if (isNaN(n)||n===null) return '—';
  if (Math.abs(n)>=1000000) return (n/1000000).toFixed(2).replace('.',',')+' M€';
  if (Math.abs(n)>=1000)    return (n/1000).toFixed(1).replace('.',',')+' k€';
  return fmt0(n)+' €';
};

// ── Chargement ────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><span>Chargement des données…</span></div>';
  document.getElementById('last-update').textContent = 'Chargement…';
  try {
    const r = await fetch(APPS_SCRIPT_URL);
    const j = await r.json();
    if (j.status !== 'ok') throw new Error(j.error || 'Erreur Apps Script');
    rawData = enrich(j.data);
    document.getElementById('last-update').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    applyFilters();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading"><span style="font-size:40px">⚠️</span><span style="color:#E05A4A;font-weight:600">Erreur : ${e.message}</span><button class="btn-refresh" onclick="loadData()">↻ Réessayer</button></div>`;
    document.getElementById('last-update').textContent = 'Erreur';
    console.error(e);
  }
}

function enrich(data) {
  return data.map(r => {
    const parts = (r.mois || '').split(' ');
    const calYear = parseInt(parts[parts.length-1]) || 0;
    const monthNum = MOIS_NUM[r.moisKey] || 0;
    return {...r, calYear, monthNum, sortKey: calYear*100 + monthNum};
  }).sort((a,b) => a.sortKey - b.sortKey);
}

function applyFilters() {
  if (!rawData.length) return;
  const n = parseInt(document.getElementById('nb-months').value) || 12;
  renderAll(n);
}

// ── Calcul des N mois glissants depuis aujourd'hui ────────────────────────────
function getTodaySortKey() {
  const now = new Date();
  return now.getFullYear() * 100 + (now.getMonth() + 1);
}

function buildMonthSlots(n) {
  // Génère n sortKeys consécutifs se terminant au mois courant (date système)
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 1;
  const slots = [];
  for (let i = 0; i < n; i++) {
    slots.unshift(y * 100 + m); // du plus récent au plus ancien → unshift pour ordre chronologique
    m--;
    if (m === 0) { m = 12; y--; }
  }
  return slots; // tableau trié du plus ancien au plus récent
}

// ── Rendu principal ───────────────────────────────────────────────────────────
function renderAll(n) {
  const slots = buildMonthSlots(n); // n sortKeys ancrés sur aujourd'hui
  // Pour chaque slot, trouver la ligne de données correspondante (ou null)
  const last = slots.map(key => rawData.find(r => r.sortKey === key) || null);

  // Mois en cours = slot le plus récent (= aujourd'hui)
  // Pour la jauge : prendre la dernière ligne avec des données réelles
  const currRow = rawData.find(r => r.sortKey === getTodaySortKey())
    || rawData.slice().reverse().find(r => r.sortKey <= getTodaySortKey()) // mois le plus récent ≤ aujourd'hui
    || rawData[rawData.length - 1];

  chartLast  = last;
  chartSlots = slots;

  Object.values(CHARTS).forEach(c => c.destroy()); CHARTS = {};

  document.getElementById('content').innerHTML = SITES.map(s => buildBlock(s, last, slots, currRow)).join('');
  SITES.forEach(s => renderChart(s, last, slots));
}

// ── Bloc magasin ──────────────────────────────────────────────────────────────
function buildBlock(site, last, slots, currRow) {
  const color = SITE_COLORS[site];
  const curr = currRow; // ligne du mois en cours (date système), peut être null si pas encore de données
  const prev = curr ? rawData.find(r => r.moisKey === curr.moisKey && r.calYear === curr.calYear - 1) : null;

  let gaugePct = null, moyN1 = null, objectif = null, moyN = null;

  if (curr && prev && prev.nb_jours > 0 && curr.nb_jours > 0) {
    moyN1    = prev[site] / prev.nb_jours;
    objectif = moyN1 * curr.nb_jours;
    if (objectif > 0) gaugePct = (curr[site] / objectif) * 100;
  }
  if (curr && curr.nb_jours > 0) moyN = curr[site] / curr.nb_jours;

  const ecart    = (objectif != null && curr) ? curr[site] - objectif : null;
  const ecartCls = ecart === null ? '' : Math.abs(ecart/objectif) < 0.01 ? '' : ecart >= 0 ? 'ecart-pos' : 'ecart-neg';
  const ecartStr = ecart === null ? '—'
    : (ecart >= 0 ? '▲ +' : '▼ ') + fmt0(Math.abs(ecart)) + ' €'
    + (objectif > 0 ? ' (' + (ecart>=0?'+':'') + ((ecart/objectif)*100).toFixed(1) + '%)' : '');

  // Label du mois en cours depuis la date système
  const now = new Date();
  const mNamesLong = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const todayLabel = mNamesLong[now.getMonth()] + ' ' + now.getFullYear();
  const currMoisLabel = curr ? curr.mois : todayLabel + ' (aucune donnée)';
  const currJours     = curr ? curr.nb_jours : 0;
  const currCA        = curr ? curr[site] : null;

  return `
  <div class="site-block">
    <div class="site-header">
      <div class="site-name">
        <div class="site-dot" style="background:${color}"></div>
        ${SITE_NAMES[site]}
      </div>
      <div class="site-meta">
        <span>Mois en cours : <strong>${currMoisLabel}</strong></span>
        ${curr
          ? `<span class="days-badge" style="background:${color}">📅 ${currJours} jour${currJours>1?'s':''} travaillé${currJours>1?'s':''} (N)</span>`
          : `<span class="days-badge" style="background:#aaa">📅 Pas encore de données</span>`}
        ${prev ? `<span style="background:${color}44;color:${color};padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">${prev.nb_jours}j N-1</span>` : '<span style="color:#ccc;font-size:11px">N-1 non disponible</span>'}
      </div>
    </div>
    <div class="site-body">
      <div class="gauge-panel">
        <div class="gauge-title">Avancement ${curr ? curr.mois.split(' ')[0] : todayLabel.split(' ')[0]}</div>
        ${makeGaugeSVG(gaugePct, color)}
        <div class="metric-grid">
          <div class="metric-item">
            <div class="metric-label">Moy/j N-1</div>
            <div class="metric-value">${fmtE(moyN1)}</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">Moy/j N</div>
            <div class="metric-value">${fmtE(moyN)}</div>
          </div>
          <div class="metric-item" style="background:${color}18;border:1.5px solid ${color}44">
            <div class="metric-label" style="color:${color}">Objectif N</div>
            <div class="metric-value" style="color:${color}">${fmtE(objectif)}</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">CA réel N</div>
            <div class="metric-value">${currCA !== null ? fmtE(currCA) : '—'}</div>
          </div>
          <div class="metric-item full ${ecartCls}">
            <div class="metric-label">Écart vs objectif</div>
            <div class="metric-value">${ecartStr}</div>
          </div>
        </div>
      </div>
      <div class="chart-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
          <div style="font-size:11px;color:var(--text-light)">Survoler pour détail jours + moy/jour</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <div style="display:flex;gap:3px;">
              <button id="btn-type-bar-${site}"  class="toggle-btn active" onclick="setChartType('${site}','bar')">&#9646; Barres</button>
              <button id="btn-type-line-${site}" class="toggle-btn"        onclick="setChartType('${site}','line')">&#8725; Courbes</button>
            </div>
            <div style="width:1px;height:22px;background:var(--border)"></div>
            <div style="display:flex;gap:3px;">
              <button id="btn-metric-ca-${site}"  class="toggle-btn active" onclick="setChartMetric('${site}','ca')">CA total</button>
              <button id="btn-metric-moy-${site}" class="toggle-btn"        onclick="setChartMetric('${site}','moy')">Moy/jour</button>
            </div>
          </div>
        </div>
        <canvas id="chart-${site}" height="145"></canvas>
      </div>
    </div>
  </div>`;
}

// ── Jauge SVG (style compteur segmenté) ──────────────────────────────────────
function makeGaugeSVG(pct) {
  // Layout
  const W = 240, H = 162;
  const cx = 120, cy = 118;
  const Ro = 96, Ri = 64; // outer / inner radius

  // Sweep: 210° total, starting at 210° (lower-left), ending at 0° (right)
  const START  = 210;   // degrees (math convention)
  const SWEEP  = 210;   // total degrees
  const N      = 14;    // segments
  const GAP    = 3;     // degrees between segments
  const MAX_PCT = 150;
  const SEG_SWEEP = (SWEEP - (N - 1) * GAP) / N; // ≈ 12°

  // Colors: red → orange → yellow → green (14 steps)
  const COLORS = [
    '#E82010','#EC3818','#EE5018',
    '#F06828','#F28030',
    '#F49C28','#F4B820',
    '#EED020','#D4D020',
    '#AACC28','#7AC038',
    '#48B840','#28A848',
    '#109050'
  ];
  const GRAY = '#DDE0EA';

  const f = v => v.toFixed(2);
  // Math angle → SVG point
  const pt = (deg, r) => {
    const rad = deg * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy - r * Math.sin(rad)];
  };

  // Annular sector path: outer arc CCW (sweep=0), inner arc CW (sweep=1)
  const sector = (a1, a2) => {
    const [x1,y1]=pt(a1,Ro), [x2,y2]=pt(a2,Ro), [x3,y3]=pt(a2,Ri), [x4,y4]=pt(a1,Ri);
    return `M${f(x1)},${f(y1)} A${Ro},${Ro} 0 0,0 ${f(x2)},${f(y2)} L${f(x3)},${f(y3)} A${Ri},${Ri} 0 0,1 ${f(x4)},${f(y4)} Z`;
  };

  // How many segments are filled?
  const filled = pct === null ? 0 : Math.round((Math.min(Math.max(pct, 0), MAX_PCT) / MAX_PCT) * N);

  let segs = '';
  for (let i = 0; i < N; i++) {
    const a1 = START - i * (SEG_SWEEP + GAP);
    const a2 = a1 - SEG_SWEEP;
    const color = i < filled ? COLORS[i] : GRAY;
    segs += `<path d="${sector(a1, a2)}" fill="${color}" stroke="white" stroke-width="1.5"/>`;
  }

  // Needle
  let needle = '';
  const clamp = pct === null ? 0 : Math.min(Math.max(pct, 0), MAX_PCT);
  const needleDeg = START - (clamp / MAX_PCT) * SWEEP;
  const [ntx, nty] = pt(needleDeg, Ro - 8);
  const [nox, noy] = pt(needleDeg + 180, 10); // small tail
  needle = `
    <line x1="${f(nox)}" y1="${f(noy)}" x2="${f(ntx)}" y2="${f(nty)}" stroke="#1A2440" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="8" fill="#1A2440"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="white"/>`;

  // 100% marker line (white dashed line at segment boundary)
  const seg100 = Math.round((100 / MAX_PCT) * N); // ≈ segment index 9.3
  const marker100deg = START - seg100 * (SEG_SWEEP + GAP) + GAP / 2;
  const [m1x,m1y] = pt(marker100deg, Ri - 4);
  const [m2x,m2y] = pt(marker100deg, Ro + 4);

  // Badge with % value
  const display = pct === null ? '—' : pct.toFixed(1) + '%';
  const badgeW = 54, badgeH = 22;
  const bx = cx - badgeW / 2, by = cy + 22;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block;margin:0 auto">
    ${segs}
    <line x1="${f(m1x)}" y1="${f(m1y)}" x2="${f(m2x)}" y2="${f(m2y)}" stroke="white" stroke-width="2.5" stroke-dasharray="4,3" opacity="0.9"/>
    ${needle}
    <rect x="${bx}" y="${by}" width="${badgeW}" height="${badgeH}" rx="5" fill="#1A2440"/>
    <text x="${cx}" y="${by + 15}" text-anchor="middle" font-size="12" font-weight="800" fill="white" font-family="Inter">${display}</text>
  </svg>`;
}

// ── Graphique (barres ou courbes, CA ou moy/jour) ─────────────────────────────
function renderChart(site, last, slots) {
  const ctx = document.getElementById('chart-' + site);
  if (!ctx) return;

  const color  = SITE_COLORS[site];
  const type   = chartType[site]   || 'bar';
  const metric = chartMetric[site] || 'ca';
  const isMoy  = metric === 'moy';
  const isLine = type === 'line';

  const labels = [], dataN = [], dataN1 = [], metaN = [], metaN1 = [];
  const mNames = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  for (let i = 0; i < slots.length; i++) {
    const key = slots[i];
    const row = last[i];
    const y = Math.floor(key / 100), m = key % 100;
    labels.push(mNames[m-1] + " '" + String(y).slice(2));

    const prev = row ? rawData.find(r => r.moisKey === row.moisKey && r.calYear === row.calYear - 1) : null;
    metaN.push(row || null);
    metaN1.push(prev || null);

    // Valeur selon métrique
    const val  = row  ? (isMoy && row.nb_jours  > 0 ? row[site]  / row.nb_jours  : (!isMoy ? row[site]  || 0 : null)) : null;
    const val1 = prev ? (isMoy && prev.nb_jours > 0 ? prev[site] / prev.nb_jours : (!isMoy ? prev[site] || 0 : null)) : null;
    dataN.push(val  !== null ? Math.round(val)  : null);
    dataN1.push(val1 !== null ? Math.round(val1) : null);
  }

  const labelN1 = isMoy ? 'N-1 moy/jour (réf.)' : 'N-1 CA total (réf.)';
  const labelN  = isMoy ? 'N moy/jour (réel)'   : 'N CA total (réel)';
  const yLabel  = isMoy ? v => fmt0(v) + ' €/j'  : v => fmtK(v);

  const dsBase = { spanGaps: true, borderRadius: isLine ? 0 : 4, borderSkipped: false };

  const ds1 = isLine
    ? { ...dsBase, label:labelN1, data:dataN1, borderColor:color+'88', backgroundColor:color+'18',
        borderWidth:2, borderDash:[5,4], fill:false, tension:.35, pointRadius:3, pointBorderColor:color+'88', pointBackgroundColor:'#fff' }
    : { ...dsBase, label:labelN1, data:dataN1, backgroundColor:color+'44', borderColor:color+'70', borderWidth:1 };

  const ds2 = isLine
    ? { ...dsBase, label:labelN, data:dataN, borderColor:color, backgroundColor:color+'22',
        borderWidth:2.5, fill:false, tension:.35, pointRadius:4, pointBackgroundColor:color }
    : { ...dsBase, label:labelN, data:dataN, backgroundColor:color+'CC', borderColor:color, borderWidth:1.5 };

  // Plugin inline : affiche le % N vs N-1 au-dessus de chaque point/barre N
  const pctPlugin = {
    id: 'pctLabels',
    afterDatasetsDraw(chart) {
      const { ctx, scales: { x, y } } = chart;
      const ds = chart.data.datasets[1]; // dataset N
      ctx.save();
      ctx.font = '700 10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';

      ds.data.forEach((valN, i) => {
        const valN1 = chart.data.datasets[0].data[i];
        if (valN === null || valN1 === null || valN1 === 0) return;
        const pct = ((valN - valN1) / valN1) * 100;
        const sign = pct >= 0 ? '+' : '';
        const label = sign + pct.toFixed(1) + '%';
        const bgColor = pct >= 2 ? '#28A745' : pct <= -2 ? '#E05A4A' : '#E8A020';

        // Position : au-dessus de la barre N (ou du point en mode ligne)
        const meta = chart.getDatasetMeta(1);
        const el = meta.data[i];
        if (!el) return;
        const px = el.x;
        const py = isLine ? el.y - 6 : y.getPixelForValue(Math.max(valN, valN1)) - 6;

        // Badge arrondi
        const tw = ctx.measureText(label).width + 8;
        const th = 14;
        const bx = px - tw / 2, by = py - th;
        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.roundRect(bx, by, tw, th, 3);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText(label, px, py - 1);
      });
      ctx.restore();
    }
  };

  CHARTS[site] = new Chart(ctx, {
    type: isLine ? 'line' : 'bar',
    data: { labels, datasets: [ds1, ds2] },
    plugins: [pctPlugin],
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { position:'top', labels:{ font:{family:'Inter',size:11}, padding:14, boxWidth:14, useBorderRadius:true, borderRadius:3 } },
        tooltip: {
          callbacks: {
            label(c) {
              const isN  = c.datasetIndex === 1;
              const row  = isN ? metaN[c.dataIndex] : metaN1[c.dataIndex];
              if (!row || c.raw === null) return ` ${c.dataset.label} : N/A`;
              const ca   = row[site] || 0;
              const j    = row.nb_jours;
              const moy  = j > 0 ? Math.round(ca / j) : null;
              const lines = [
                ` ${c.dataset.label} : ${fmt0(c.raw)} €${isMoy ? '/j' : ''}`,
                ` CA total : ${fmt0(ca)} €`,
                ` Jours travaillés : ${j}`,
                ` Moy/jour : ${moy !== null ? fmt0(moy) + ' €/j' : '—'}`,
              ];
              if (isN) {
                const prow = metaN1[c.dataIndex];
                if (prow && prow.nb_jours > 0 && j > 0) {
                  const obj  = Math.round((prow[site] / prow.nb_jours) * j);
                  const diff = ca - obj;
                  lines.push(` Objectif : ${fmt0(obj)} € | Écart : ${diff >= 0 ? '+' : ''}${fmt0(diff)} €`);
                }
              }
              return lines;
            }
          }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{family:'Inter',size:10}} },
        y: { ticks:{font:{family:'Inter',size:10}, callback: yLabel}, grid:{color:'#E8EDF8'} }
      }
    }
  });
}

loadData();
</script>
